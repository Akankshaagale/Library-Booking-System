<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Library Booking – Concurrency Stress Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & base ───────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --surface2:  #1a1a28;
    --border:    #2a2a3f;
    --accent:    #6c63ff;
    --accent2:   #ff6584;
    --success:   #00d9a3;
    --fail:      #ff4757;
    --pending:   #ffa502;
    --text:      #e8e8f0;
    --muted:     #6b6b8a;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise texture overlay ──────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* ── Layout ─────────────────────────────────────────── */
  .container {
    position: relative; z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 56px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 40px;
  }

  .logo-icon {
    flex-shrink: 0;
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 26px;
  }

  .header-text h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .header-text p {
    margin-top: 6px;
    color: var(--muted);
    font-size: 14px;
    font-family: var(--mono);
  }

  /* ── Grid ───────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

  /* ── Card ───────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .card-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }

  /* ── Books list ─────────────────────────────────────── */
  #bookList { display: flex; flex-direction: column; gap: 10px; }

  .book-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color .2s, transform .15s;
  }

  .book-item:hover { border-color: var(--accent); transform: translateX(3px); }
  .book-item.selected { border-color: var(--accent); background: rgba(108,99,255,.08); }

  .book-info { display: flex; flex-direction: column; gap: 2px; }
  .book-title { font-weight: 600; font-size: 14px; }
  .book-author { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .qty-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 700;
    transition: background .3s, color .3s;
  }
  .qty-badge.available { background: rgba(0,217,163,.12); color: var(--success); }
  .qty-badge.out       { background: rgba(255,71,87,.12);  color: var(--fail);    }

  /* ── Control panel ──────────────────────────────────── */
  .control-panel { grid-column: span 2; }
  @media (max-width: 640px) { .control-panel { grid-column: span 1; } }

  .control-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  label { font-size: 13px; color: var(--muted); font-family: var(--mono); }

  input[type="number"], input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 10px 14px;
    width: 120px;
    outline: none;
    transition: border-color .2s;
  }
  input[type="text"] { width: 180px; }
  input:focus { border-color: var(--accent); }

  /* ── Buttons ────────────────────────────────────────── */
  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    transition: opacity .2s, transform .15s;
  }
  .btn:hover  { opacity: .85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--fail);   color: #fff; }
  .btn-ghost   {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }

  /* ── Progress bar ───────────────────────────────────── */
  #progressWrap {
    margin-top: 20px;
    display: none;
  }
  #progressWrap.visible { display: block; }

  .progress-label {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .15s;
  }

  /* ── Stats row ──────────────────────────────────────── */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1; min-width: 90px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
  }
  .stat-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-num.success { color: var(--success); }
  .stat-num.fail    { color: var(--fail);    }
  .stat-num.pending { color: var(--pending); }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-top: 4px;
    font-family: var(--mono);
  }

  /* ── Results log ────────────────────────────────────── */
  .full-width { grid-column: span 2; }
  @media (max-width: 640px) { .full-width { grid-column: span 1; } }

  #log {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }

  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .log-entry {
    display: grid;
    grid-template-columns: 40px 90px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 12px;
    animation: slideIn .25s ease;
    background: var(--surface2);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-entry.success { border-left: 3px solid var(--success); }
  .log-entry.fail    { border-left: 3px solid var(--fail);    }
  .log-entry.pending { border-left: 3px solid var(--pending); }

  .log-req  { color: var(--muted); }
  .log-code { font-weight: 700; }
  .log-code.s201 { color: var(--success); }
  .log-code.s409, .log-code.s422, .log-code.s500 { color: var(--fail); }
  .log-msg  { color: var(--text); }
  .log-time { color: var(--muted); text-align: right; }

  /* ── Verdict banner ─────────────────────────────────── */
  #verdict {
    display: none;
    margin-top: 16px;
    padding: 16px 20px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 15px;
    border: 1px solid;
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  #verdict.pass {
    background: rgba(0,217,163,.08);
    border-color: var(--success);
    color: var(--success);
  }
  #verdict.fail-verdict {
    background: rgba(255,71,87,.08);
    border-color: var(--fail);
    color: var(--fail);
  }

  /* ── Misc ───────────────────────────────────────────── */
  .empty { color: var(--muted); font-family: var(--mono); font-size: 13px; padding: 12px 0; }
  .glow-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 32px 0;
    opacity: .35;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo-icon">📚</div>
    <div class="header-text">
      <h1>Library Booking System</h1>
      <p>High-Concurrency Stress-Test Interface — Race Condition Prevention Demo</p>
    </div>
  </header>

  <div class="grid">

    <!-- Books panel -->
    <div class="card">
      <div class="card-title">Available Books</div>
      <div id="bookList"><p class="empty">Loading books…</p></div>
    </div>

    <!-- Controls panel -->
    <div class="card">
      <div class="card-title">Stress Test Controls</div>
      <div class="control-row">
        <div>
          <label>Concurrent Requests</label><br />
          <input type="number" id="numRequests" value="10" min="1" max="50" />
        </div>
        <div>
          <label>User ID Prefix</label><br />
          <input type="text" id="userPrefix" value="stress_user" />
        </div>
      </div>

      <div class="control-row" style="margin-top:16px;">
        <button class="btn btn-primary" id="btnStress" onclick="runStressTest()">
          ⚡ Fire Stress Test
        </button>
        <button class="btn btn-ghost" onclick="resetData()">
          🔄 Reset Demo Data
        </button>
        <button class="btn btn-ghost" onclick="refreshBooks()">
          ↻ Refresh Books
        </button>
      </div>

      <!-- Progress -->
      <div id="progressWrap">
        <div class="progress-label">
          <span id="progressText">Running…</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat">
          <div class="stat-num success" id="statSuccess">—</div>
          <div class="stat-label">Success</div>
        </div>
        <div class="stat">
          <div class="stat-num fail" id="statFail">—</div>
          <div class="stat-label">Rejected</div>
        </div>
        <div class="stat">
          <div class="stat-num pending" id="statTotal">—</div>
          <div class="stat-label">Total</div>
        </div>
      </div>

      <div id="verdict"></div>
    </div>

    <!-- Log -->
    <div class="card full-width">
      <div class="card-title">Request Log</div>
      <div id="log"><p class="empty">Fire a stress test to see results…</p></div>
    </div>

  </div><!-- /grid -->

</div><!-- /container -->

<script>
  const API = ''; // same origin; change to http://localhost:3000 if different
  let selectedBookId = null;

  /* ── Fetch & render book list ─────────────────────── */
  async function refreshBooks() {
    const res  = await fetch(`${API}/api/books`);
    const data = await res.json();
    const list = document.getElementById('bookList');
    list.innerHTML = '';
    data.books.forEach(b => {
      const el = document.createElement('div');
      el.className = 'book-item' + (b.id === selectedBookId ? ' selected' : '');
      el.dataset.id = b.id;
      el.innerHTML = `
        <div class="book-info">
          <span class="book-title">${b.title}</span>
          <span class="book-author">${b.author}</span>
        </div>
        <span class="qty-badge ${b.quantity > 0 ? 'available' : 'out'}">
          qty: ${b.quantity}
        </span>`;
      el.onclick = () => selectBook(b.id, el);
      list.appendChild(el);
    });
    // Auto-select first book
    if (!selectedBookId && data.books.length) {
      const first = list.querySelector('.book-item');
      if (first) selectBook(data.books[0].id, first);
    }
  }

  function selectBook(id, el) {
    document.querySelectorAll('.book-item').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedBookId = id;
  }

  /* ── Reset demo data ──────────────────────────────── */
  async function resetData() {
    await fetch(`${API}/api/reset`, { method: 'DELETE' });
    clearLog();
    await refreshBooks();
  }

  /* ── Clear log & stats ────────────────────────────── */
  function clearLog() {
    document.getElementById('log').innerHTML = '';
    document.getElementById('statSuccess').textContent = '—';
    document.getElementById('statFail').textContent    = '—';
    document.getElementById('statTotal').textContent   = '—';
    document.getElementById('verdict').style.display   = 'none';
    document.getElementById('progressWrap').classList.remove('visible');
  }

  /* ── Stress test ──────────────────────────────────── */
  async function runStressTest() {
    if (!selectedBookId) return alert('Please select a book first.');

    const n      = Math.max(1, parseInt(document.getElementById('numRequests').value) || 10);
    const prefix = document.getElementById('userPrefix').value.trim() || 'user';
    const btn    = document.getElementById('btnStress');

    btn.disabled = true;
    clearLog();
    document.getElementById('log').innerHTML = '';

    // Show progress
    const wrap = document.getElementById('progressWrap');
    const fill = document.getElementById('progressFill');
    const pText = document.getElementById('progressText');
    const pPct  = document.getElementById('progressPct');
    wrap.classList.add('visible');
    fill.style.width = '0%';
    pText.textContent = `Firing ${n} simultaneous requests…`;
    pPct.textContent  = '0%';

    let completed = 0, successes = 0, failures = 0;

    // Build all promises simultaneously (Promise.all = true concurrency)
    const promises = Array.from({ length: n }, (_, i) => {
      const userId = `${prefix}_${i + 1}`;
      const start  = performance.now();

      return fetch(`${API}/api/book`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ bookId: selectedBookId, userId }),
      })
      .then(async res => {
        const data = await res.json();
        const ms   = Math.round(performance.now() - start);
        const ok   = res.status === 201;
        if (ok) successes++; else failures++;
        completed++;
        updateProgress(completed, n, fill, pPct);
        appendLog(i + 1, res.status, data.message, ms, ok);
        return { ok, status: res.status };
      })
      .catch(err => {
        failures++; completed++;
        updateProgress(completed, n, fill, pPct);
        appendLog(i + 1, 'ERR', err.message, 0, false);
        return { ok: false, status: 0 };
      });
    });

    await Promise.all(promises);

    // Final stats
    document.getElementById('statSuccess').textContent = successes;
    document.getElementById('statFail').textContent    = failures;
    document.getElementById('statTotal').textContent   = n;
    pText.textContent = 'Complete';

    // Verdict
    const v = document.getElementById('verdict');
    v.style.display = 'block';
    if (successes <= 1 && failures === n - successes) {
      v.className = 'pass';
      v.textContent = `✅ PASS — ${successes} success, ${failures} rejected. Race condition prevented.`;
    } else {
      v.className = 'fail-verdict';
      v.textContent = `❌ FAIL — ${successes} succeeded (expected ≤ 1). Race condition detected!`;
    }

    await refreshBooks();
    btn.disabled = false;
  }

  function updateProgress(done, total, fill, pPct) {
    const pct = Math.round((done / total) * 100);
    fill.style.width = pct + '%';
    pPct.textContent = pct + '%';
  }

  function appendLog(idx, code, msg, ms, ok) {
    const log = document.getElementById('log');
    if (log.querySelector('.empty')) log.innerHTML = '';

    const codeClass = code === 201 ? 's201' : (code === 409 ? 's409' : 's500');
    const entry = document.createElement('div');
    entry.className = `log-entry ${ok ? 'success' : 'fail'}`;
    entry.innerHTML = `
      <span class="log-req">#${String(idx).padStart(2, '0')}</span>
      <span class="log-code ${codeClass}">${code}</span>
      <span class="log-msg">${escHtml(msg)}</span>
      <span class="log-time">${ms}ms</span>`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Init ─────────────────────────────────────────── */
  refreshBooks();
</script>
</body>
</html>
